<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E30613">
  <title>Admin - BENAION DELIVERY</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .hidden { display: none; }
    .stat-card { padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    .stat-value { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
    .stat-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
          </div>
          <div class="logo-text">
            <h1>BENAION ADMIN</h1>
            <p id="adminStatus">Painel de Controle</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="window.Auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statPedidosHoje">0</div>
          <div class="stat-label">Pedidos Hoje</div>
        </div>
        <div class="stat-card" style="background: var(--primary-yellow);">
          <div class="stat-value" id="statFaturamento">R$ 0,00</div>
          <div class="stat-label">Taxas Hoje</div>
        </div>
        <div class="stat-card" style="background: #2ecc71; color: white;">
          <div class="stat-value" id="statPedidosAtivos">0</div>
          <div class="stat-label">Ativos Agora</div>
        </div>
      </div>

      <div class="tabs-container" style="display: flex; gap: 10px; margin: 20px 0; overflow-x: auto;">
        <button class="btn btn-small btn-primary btn-filter active" onclick="window.filtrarPedidos('todos')">📋 Todos</button>
        <button class="btn btn-small btn-outline btn-filter" onclick="window.filtrarPedidos('aguardando_entregador')">🔍 No Radar</button>
        <button class="btn btn-small btn-outline btn-filter" onclick="window.filtrarPedidos('aceito')">🛵 Em Entrega</button>
        <button class="btn btn-small btn-outline btn-filter" onclick="window.filtrarPedidos('finalizado')">✅ Finalizados</button>
        <button class="btn btn-small btn-outline btn-filter" onclick="window.filtrarPedidos('cancelado')">❌ Cancelados</button>
      </div>

      <div class="card" style="margin-bottom: 20px;">
        <h3 style="margin-bottom: 15px;">📊 Tabela de Taxas por Bairro</h3>
        <div id="listaConfigTaxas"></div>
        <button id="btnSalvarTaxas" class="btn btn-primary" onclick="window.salvarNovasTaxas()" style="margin-top: 15px;">
          <i class="fas fa-save"></i> Salvar Taxas
        </button>
      </div>

      <button class="btn btn-success" onclick="window.Utils.showModal('novoPedidoModal')" style="margin-bottom: 20px;">
        <i class="fas fa-plus"></i> Lançar Pedido Manual
      </button>

      <h3 style="margin-bottom: 15px;">📦 Monitoramento</h3>
      <div id="containerPedidosAdmin"></div>
    </main>
  </div>

  <!-- Modal Lançar Pedido Manual -->
  <div class="modal" id="novoPedidoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Lançar Pedido (Admin)</h3>
        <button class="modal-close" onclick="window.Utils.hideModal('novoPedidoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="window.lancarPedidoManual(event)">
          <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" id="manualCliente" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Produto</label>
            <input type="text" id="manualProduto" class="form-control" required>
          </div>
          <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
              <label>Bairro Retirada</label>
              <input type="text" id="manualBairroRet" class="form-control" placeholder="Agreste" required>
            </div>
            <div>
              <label>Bairro Entrega</label>
              <input type="text" id="manualBairroEnt" class="form-control" placeholder="Cajari" required>
            </div>
          </div>
          <div class="form-group">
            <label>Taxa de Entrega (R$)</label>
            <input type="number" id="manualTaxa" class="form-control" step="0.01" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Lançar no Radar</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
